<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ResumeScanner AI</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --border: #1e1e2e;
    --accent: #6c63ff;
    --accent2: #00d4aa;
    --accent3: #ff6b6b;
    --text: #e8e8f0;
    --muted: #666680;
    --card: #14141f;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(108,99,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(108,99,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* Glow blobs */
  .blob {
    position: fixed;
    border-radius: 50%;
    filter: blur(120px);
    opacity: 0.15;
    pointer-events: none;
    z-index: 0;
  }
  .blob-1 { width: 500px; height: 500px; background: var(--accent); top: -200px; left: -100px; }
  .blob-2 { width: 400px; height: 400px; background: var(--accent2); bottom: -150px; right: -100px; }

  /* NAV */
  nav {
    position: relative;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 48px;
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(20px);
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 20px;
    letter-spacing: -0.5px;
  }
  .logo span { color: var(--accent); }

  .nav-badge {
    background: rgba(108,99,255,0.15);
    border: 1px solid rgba(108,99,255,0.3);
    color: var(--accent);
    padding: 6px 14px;
    border-radius: 100px;
    font-size: 12px;
    font-weight: 500;
  }

  /* MAIN */
  main {
    position: relative;
    z-index: 1;
    max-width: 1100px;
    margin: 0 auto;
    padding: 60px 24px 80px;
  }

  /* HERO */
  .hero {
    text-align: center;
    margin-bottom: 56px;
    animation: fadeUp 0.6s ease both;
  }

  .hero-tag {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(0,212,170,0.1);
    border: 1px solid rgba(0,212,170,0.25);
    color: var(--accent2);
    padding: 6px 16px;
    border-radius: 100px;
    font-size: 12px;
    font-weight: 500;
    margin-bottom: 20px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .hero h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(36px, 5vw, 56px);
    font-weight: 800;
    line-height: 1.1;
    letter-spacing: -1.5px;
    margin-bottom: 16px;
  }

  .hero h1 .highlight {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .hero p {
    color: var(--muted);
    font-size: 17px;
    font-weight: 300;
    max-width: 480px;
    margin: 0 auto;
    line-height: 1.6;
  }

  /* FORM GRID */
  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 20px;
    animation: fadeUp 0.6s 0.1s ease both;
  }

  .input-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    transition: border-color 0.2s;
  }
  .input-card:focus-within {
    border-color: rgba(108,99,255,0.5);
    box-shadow: 0 0 0 4px rgba(108,99,255,0.08);
  }

  .input-label {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
  }

  .input-label .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
  }
  .input-label .dot.green { background: var(--accent2); }

  textarea {
    width: 100%;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    line-height: 1.7;
    resize: none;
    height: 220px;
    placeholder-color: var(--muted);
  }

  textarea::placeholder { color: var(--muted); }

  /* SCAN BUTTON */
  .scan-btn {
    width: 100%;
    padding: 18px;
    background: linear-gradient(135deg, var(--accent), #8b80ff);
    border: none;
    border-radius: 14px;
    color: white;
    font-family: 'Syne', sans-serif;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.5px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    animation: fadeUp 0.6s 0.2s ease both;
  }

  .scan-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 12px 40px rgba(108,99,255,0.4);
  }

  .scan-btn:active { transform: translateY(0); }

  .scan-btn.loading {
    background: var(--surface);
    color: var(--muted);
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
  }

  .spinner {
    width: 18px; height: 18px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: none;
  }

  .scan-btn.loading .spinner { display: block; }
  .scan-btn.loading .btn-text { display: none; }

  /* RESULTS */
  #results {
    margin-top: 32px;
    display: none;
    animation: fadeUp 0.5s ease both;
  }

  .results-header {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 16px;
  }

  .results-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 16px;
  }

  .result-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px 24px;
    position: relative;
    overflow: hidden;
    transition: transform 0.2s, border-color 0.2s;
  }

  .result-card:hover {
    transform: translateY(-3px);
    border-color: rgba(108,99,255,0.3);
  }

  .result-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
  }

  .result-card.category::before { background: linear-gradient(90deg, var(--accent), transparent); }
  .result-card.match::before    { background: linear-gradient(90deg, var(--accent2), transparent); }
  .result-card.ats::before      { background: linear-gradient(90deg, var(--accent3), transparent); }

  .result-icon {
    width: 40px; height: 40px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    margin-bottom: 16px;
  }

  .result-card.category .result-icon { background: rgba(108,99,255,0.15); }
  .result-card.match .result-icon    { background: rgba(0,212,170,0.15); }
  .result-card.ats .result-icon      { background: rgba(255,107,107,0.15); }

  .result-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .result-value {
    font-family: 'Syne', sans-serif;
    font-size: 24px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }

  .result-card.category .result-value { color: var(--accent); }
  .result-card.match .result-value    { color: var(--accent2); }
  .result-card.ats .result-value      { color: var(--accent3); }

  /* ATS Progress bar */
  .ats-bar {
    margin-top: 12px;
    height: 4px;
    background: var(--border);
    border-radius: 100px;
    overflow: hidden;
  }

  .ats-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent3), #ff8e8e);
    border-radius: 100px;
    transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
    width: 0%;
  }

  /* Match badge */
  .match-badge {
    display: inline-block;
    margin-top: 8px;
    padding: 4px 12px;
    border-radius: 100px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.5px;
  }

  .match-badge.fit {
    background: rgba(0,212,170,0.15);
    color: var(--accent2);
    border: 1px solid rgba(0,212,170,0.3);
  }

  .match-badge.no-fit {
    background: rgba(255,107,107,0.15);
    color: var(--accent3);
    border: 1px solid rgba(255,107,107,0.3);
  }

  /* Error */
  .error-msg {
    background: rgba(255,107,107,0.1);
    border: 1px solid rgba(255,107,107,0.3);
    color: var(--accent3);
    padding: 14px 18px;
    border-radius: 12px;
    font-size: 14px;
    margin-top: 16px;
    display: none;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  @media (max-width: 768px) {
    nav { padding: 16px 20px; }
    .form-grid { grid-template-columns: 1fr; }
    .results-grid { grid-template-columns: 1fr; }
    main { padding: 40px 16px 60px; }
  }
</style>
</head>
<body>

<div class="blob blob-1"></div>
<div class="blob blob-2"></div>

<nav>
  <div class="logo">Resume<span>Scanner</span></div>
  <div class="nav-badge">✦ AI Powered</div>
</nav>

<main>
  <div class="hero">
    <div class="hero-tag">✦ NLP + ML Pipeline</div>
    <h1>Scan your resume<br>against any <span class="highlight">job description</span></h1>
    <p>Instantly analyze fit, classify industry, and get your ATS score using machine learning.</p>
  </div>

  <div class="form-grid">
    <div class="input-card">
      <div class="input-label">
        <span class="dot"></span>
        Resume Text
      </div>
      <textarea id="resume" placeholder="Paste your resume here...&#10;&#10;e.g. Experienced software engineer with 5 years in Python and machine learning. Bachelor's degree in Computer Science..."></textarea>
    </div>

    <div class="input-card">
      <div class="input-label">
        <span class="dot green"></span>
        Job Description
      </div>
      <textarea id="jd" placeholder="Paste the job description here...&#10;&#10;e.g. We are looking for a Python developer with experience in machine learning and data analysis..."></textarea>
    </div>
  </div>

  <button class="scan-btn" id="scanBtn" onclick="scanResume()">
    <span class="btn-text">⚡ Scan Resume</span>
    <div class="spinner"></div>
  </button>

  <div class="error-msg" id="errorMsg"></div>

  <div id="results">
    <div class="results-header">Analysis Results</div>
    <div class="results-grid">

      <div class="result-card category">
        <div class="result-icon">🏷️</div>
        <div class="result-label">Industry Category</div>
        <div class="result-value" id="categoryVal">—</div>
      </div>

      <div class="result-card match">
        <div class="result-icon">🎯</div>
        <div class="result-label">JD Match</div>
        <div class="result-value" id="matchVal">—</div>
        <div id="matchBadge"></div>
      </div>

      <div class="result-card ats">
        <div class="result-icon">📊</div>
        <div class="result-label">ATS Score</div>
        <div class="result-value" id="atsVal">—</div>
        <div class="ats-bar"><div class="ats-fill" id="atsFill"></div></div>
      </div>

    </div>
  </div>
</main>

<script>
async function scanResume() {
  const resume = document.getElementById('resume').value.trim()
  const jd     = document.getElementById('jd').value.trim()
  const btn    = document.getElementById('scanBtn')
  const error  = document.getElementById('errorMsg')
  const results = document.getElementById('results')

  error.style.display = 'none'

  if (!resume || !jd) {
    error.textContent = 'Please fill in both Resume and Job Description.'
    error.style.display = 'block'
    return
  }

  btn.classList.add('loading')
  results.style.display = 'none'

  try {
    const res = await fetch('/api/scan', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ resume, jd })
    })

    const data = await res.json()

    if (data.error) throw new Error(data.error)

    // Populate results
    document.getElementById('categoryVal').textContent = data.category
    document.getElementById('matchVal').textContent    = data.jd_match
    document.getElementById('atsVal').textContent      = data.ats_score + '/100'

    // Match badge
    const badge = document.getElementById('matchBadge')
    const isFit = data.jd_match === 'Fit'
    badge.innerHTML = `<span class="match-badge ${isFit ? 'fit' : 'no-fit'}">${isFit ? '✓ Good match' : '✗ Not a match'}</span>`

    // ATS bar animation
    setTimeout(() => {
      document.getElementById('atsFill').style.width = data.ats_score + '%'
    }, 100)

    results.style.display = 'block'

  } catch (err) {
    error.textContent = 'Error: ' + err.message
    error.style.display = 'block'
  } finally {
    btn.classList.remove('loading')
  }
}
</script>

</body>
</html>
